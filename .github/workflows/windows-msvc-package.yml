name: Windows MSVC Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build-windows-msvc:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          # For private dependencies across repositories, provide a PAT in CI_GH_PAT.
          # Fallback to github.token for same-repo access.
          token: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}

      - name: Configure git auth for private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "CI_GH_PAT/github.token is empty; cannot access private submodules." >&2
            exit 2
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Init required submodules only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- clawconsole clawops
          git -c protocol.version=2 submodule update --init --force --depth=1 clawconsole clawops

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawconsole/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install clawconsole dependencies
        working-directory: clawconsole
        run: npm ci

      - name: Build clawconsole (windows msvc, release, no-bundle)
        working-directory: clawconsole
        run: |
          npm run build
          node ./scripts/tauri-cli.mjs build --target x86_64-pc-windows-msvc --no-bundle

      - name: Build clawops (windows msvc, release)
        working-directory: clawops
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage windows msvc package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stageDir = "output/windows-msvc"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item "clawconsole/src-tauri/target/x86_64-pc-windows-msvc/release/clawstation.exe" "$stageDir/clawstation.exe" -Force
          Copy-Item "clawops/target/x86_64-pc-windows-msvc/release/clawops.exe" "$stageDir/clawops.exe" -Force
          Copy-Item "packaging/windows-README.txt" "$stageDir/README.txt" -Force

          $webview2 = "clawconsole/src-tauri/target/x86_64-pc-windows-msvc/release/WebView2Loader.dll"
          if (Test-Path $webview2) {
            Copy-Item $webview2 "$stageDir/WebView2Loader.dll" -Force
          }

      - name: Archive windows msvc package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "output/ClawStation-windows-x86_64-msvc.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "output/windows-msvc/*" -DestinationPath $zipPath -CompressionLevel Optimal
          Get-Item $zipPath | Format-List FullName,Length,LastWriteTime

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-windows-x86_64-msvc
          path: output/ClawStation-windows-x86_64-msvc.zip
          if-no-files-found: error
