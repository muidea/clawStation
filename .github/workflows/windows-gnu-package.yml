name: Windows GNU Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build-windows-gnu:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          # For private dependencies across repositories, provide a PAT in CI_GH_PAT.
          # Fallback to github.token for same-repo access.
          token: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}

      - name: Configure git auth for private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "CI_GH_PAT/github.token is empty; cannot access private submodules." >&2
            exit 2
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Init required submodules only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- clawconsole clawops
          git -c protocol.version=2 submodule update --init --force --depth=1 clawconsole clawops

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawconsole/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Ubuntu dependencies for Windows GNU cross-build
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Install clawconsole dependencies
        working-directory: clawconsole
        run: npm ci

      - name: Build clawconsole (windows gnu, release, no-bundle)
        working-directory: clawconsole
        run: |
          npm run build
          node ./scripts/tauri-cli.mjs build --target x86_64-pc-windows-gnu --no-bundle

      - name: Build clawops (windows gnu, release)
        working-directory: clawops
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          stageDir="output/windows-gnu"
          mkdir -p "$stageDir"

          cp "clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/clawstation.exe" "$stageDir/clawstation.exe"
          cp "clawops/target/x86_64-pc-windows-gnu/release/clawops.exe" "$stageDir/clawops.exe"
          cp "packaging/windows-README.txt" "$stageDir/README.txt"

          webview2="clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/WebView2Loader.dll"
          if [ -f "$webview2" ]; then
            cp "$webview2" "$stageDir/WebView2Loader.dll"
          fi

      - name: Archive windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          zipPath="output/ClawStation-windows-x86_64-gnu.zip"
          rm -f "$zipPath"
          (
            cd output/windows-gnu
            zip -r "../ClawStation-windows-x86_64-gnu.zip" .
          )
          ls -lh "$zipPath"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-windows-x86_64-gnu
          path: output/ClawStation-windows-x86_64-gnu.zip
          if-no-files-found: error
