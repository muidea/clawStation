name: Windows GNU Cross Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to rebuild notes/release assets for, for example v0.1.4
        required: false
        type: string
      base_tag:
        description: Optional previous tag used as the release notes base, for example v0.1.3
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-gnu:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          submodules: false
          # For private dependencies across repositories, provide a PAT in CI_GH_PAT.
          # Fallback to github.token for same-repo access.
          token: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}

      - name: Configure git auth for private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "CI_GH_PAT/github.token is empty; cannot access private submodules." >&2
            exit 2
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Init required submodules only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- clawconsole clawops
          git -c protocol.version=2 submodule update --init --force clawconsole clawops

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawconsole/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Ubuntu dependencies for Windows GNU cross-build
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Install clawconsole dependencies
        working-directory: clawconsole
        run: npm ci

      - name: Build clawconsole (windows gnu, release, no-bundle)
        working-directory: clawconsole
        run: |
          npm run build
          node ./scripts/tauri-cli.mjs build --target x86_64-pc-windows-gnu --no-bundle

      - name: Build clawops (windows gnu, release)
        working-directory: clawops
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          stageDir="output/windows-gnu"
          mkdir -p "$stageDir"

          cp "clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/clawstation.exe" "$stageDir/clawstation.exe"
          cp "clawops/target/x86_64-pc-windows-gnu/release/clawops.exe" "$stageDir/clawops.exe"
          cp "packaging/windows-README.txt" "$stageDir/README.txt"

          webview2="clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/WebView2Loader.dll"
          if [ -f "$webview2" ]; then
            cp "$webview2" "$stageDir/WebView2Loader.dll"
          fi

      - name: Archive windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          zipPath="output/ClawStation-windows-x86_64-gnu.zip"
          rm -f "$zipPath"
          (
            cd output/windows-gnu
            zip -r "../ClawStation-windows-x86_64-gnu.zip" .
          )
          ls -lh "$zipPath"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          BASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.base_tag || '' }}
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="${BASE_TAG_INPUT:-}"
          if [ -z "$previous_tag" ]; then
            previous_tag="$(git tag --sort=-creatordate | grep -vx "$RELEASE_TAG" | head -n 1 || true)"
          fi
          notes_file="output/release-notes-${RELEASE_TAG}.md"

          bash ./scripts/generate-release-notes.sh \
            "$RELEASE_TAG" \
            "$RELEASE_TAG" \
            "$notes_file" \
            "$previous_tag" \
            "output/ClawStation-windows-x86_64-gnu.zip"

          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-windows-x86_64-gnu
          path: output/ClawStation-windows-x86_64-gnu.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          RELEASE_ASSET: output/ClawStation-windows-x86_64-gnu.zip
          RELEASE_NOTES_FILE: ${{ env.RELEASE_NOTES_FILE }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              "$RELEASE_ASSET" \
              --title "$RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
          fi
