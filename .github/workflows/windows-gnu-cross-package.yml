name: Windows GNU Cross Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-gnu:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          # For private dependencies across repositories, provide a PAT in CI_GH_PAT.
          # Fallback to github.token for same-repo access.
          token: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}

      - name: Configure git auth for private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.CI_GH_PAT != '' && secrets.CI_GH_PAT || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "CI_GH_PAT/github.token is empty; cannot access private submodules." >&2
            exit 2
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Init required submodules only
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- clawconsole clawops
          git -c protocol.version=2 submodule update --init --force --depth=1 clawconsole clawops

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawconsole/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Ubuntu dependencies for Windows GNU cross-build
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Install clawconsole dependencies
        working-directory: clawconsole
        run: npm ci

      - name: Build clawconsole (windows gnu, release, no-bundle)
        working-directory: clawconsole
        run: |
          npm run build
          node ./scripts/tauri-cli.mjs build --target x86_64-pc-windows-gnu --no-bundle

      - name: Build clawops (windows gnu, release)
        working-directory: clawops
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          stageDir="output/windows-gnu"
          mkdir -p "$stageDir"

          cp "clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/clawstation.exe" "$stageDir/clawstation.exe"
          cp "clawops/target/x86_64-pc-windows-gnu/release/clawops.exe" "$stageDir/clawops.exe"
          cp "packaging/windows-README.txt" "$stageDir/README.txt"

          webview2="clawconsole/src-tauri/target/x86_64-pc-windows-gnu/release/WebView2Loader.dll"
          if [ -f "$webview2" ]; then
            cp "$webview2" "$stageDir/WebView2Loader.dll"
          fi

      - name: Archive windows gnu package
        shell: bash
        run: |
          set -euo pipefail
          zipPath="output/ClawStation-windows-x86_64-gnu.zip"
          rm -f "$zipPath"
          (
            cd output/windows-gnu
            zip -r "../ClawStation-windows-x86_64-gnu.zip" .
          )
          ls -lh "$zipPath"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(git tag --sort=-creatordate | grep -vx "$RELEASE_TAG" | head -n 1 || true)"
          compare_range=""
          if [ -n "$previous_tag" ]; then
            compare_range="${previous_tag}..${RELEASE_TAG}"
          fi

          notes_file="output/release-notes-${RELEASE_TAG}.md"
          commit_lines="$(git log --no-merges --pretty=format:'- %s (%h)' ${compare_range:+$compare_range} --max-count=30)"
          if [ -z "$commit_lines" ]; then
            commit_lines="- No non-merge commits found."
          fi

          changed_areas="$(git diff --name-only ${compare_range:+$compare_range} | awk '
            BEGIN {
              counts["clawconsole"] = 0;
              counts["clawops"] = 0;
              counts["docs"] = 0;
              counts["github"] = 0;
              counts["scripts"] = 0;
              counts["other"] = 0;
            }
            /^clawconsole\// { counts["clawconsole"]++; next }
            /^clawops\// { counts["clawops"]++; next }
            /^docs\// { counts["docs"]++; next }
            /^\.github\// { counts["github"]++; next }
            /^scripts\// { counts["scripts"]++; next }
            { counts["other"]++ }
            END {
              if (counts["clawconsole"] > 0) printf("- clawconsole: %d files\n", counts["clawconsole"]);
              if (counts["clawops"] > 0) printf("- clawops: %d files\n", counts["clawops"]);
              if (counts["docs"] > 0) printf("- docs: %d files\n", counts["docs"]);
              if (counts["github"] > 0) printf("- .github: %d files\n", counts["github"]);
              if (counts["scripts"] > 0) printf("- scripts: %d files\n", counts["scripts"]);
              if (counts["other"] > 0) printf("- other: %d files\n", counts["other"]);
            }
          ')"
          if [ -z "$changed_areas" ]; then
            changed_areas="- No file changes detected."
          fi

          asset_path="output/ClawStation-windows-x86_64-gnu.zip"
          asset_sha="$(sha256sum "$asset_path" | awk '{print $1}')"
          asset_size="$(wc -c < "$asset_path" | tr -d '[:space:]')"

          cat > "$notes_file" <<EOF
          # ${RELEASE_TAG}

          ## 发布信息

          - Tag: \`${RELEASE_TAG}\`
          - Commit: \`$(git rev-parse --short "$RELEASE_TAG")\`
          - Base ref: \`${previous_tag:-<none>}\`
          - Packaging: \`GitHub Actions windows-gnu-cross-package.yml\`

          ## 变更摘要

          ${commit_lines}

          ## 变更范围

          ${changed_areas}

          ## 发布产物

          - Asset: \`ClawStation-windows-x86_64-gnu.zip\`
          - Size(bytes): \`${asset_size}\`
          - SHA256: \`${asset_sha}\`
          - Supported release asset: \`ClawStation-windows-x86_64-gnu.zip\`
          - Note: GitHub may still display platform-generated source snapshots for the tag; they are not part of the supported release delivery.
          EOF

          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-windows-x86_64-gnu
          path: output/ClawStation-windows-x86_64-gnu.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_ASSET: output/ClawStation-windows-x86_64-gnu.zip
          RELEASE_NOTES_FILE: ${{ env.RELEASE_NOTES_FILE }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              "$RELEASE_ASSET" \
              --title "$RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
          fi
